<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>onload로 이미지 크기 출력</title>
<script>
function showSize(img) {
	var mySpan = document.getElementById("mySpan");
	mySpan.innerHTML = img.width + "x" + img.height;
}

function changeImage() {
	var sel = document.getElementById("sel");
	var img = document.getElementById("myImg");
	var index = sel.selectedIndex;

	// 선택된 옵션의 텍스트를 text1 div에 표시
	var text1 = document.getElementById("text1");
	text1.innerHTML = sel.options[index].text + "를 선택하셨습니다.";

	// 이미지 로드 완료 시 크기 표시
	img.onload = function () {
		showSize(img);
	}
	img.src = sel.options[index].value;
	// 캐시된 이미지는 onload가 발생하지 않으므로 complete 체크
	if (img.complete) {
		showSize(img);
	}
}
</script>
</head>
<body onload="changeImage()">
<h3>onload로 이미지 크기 출력</h3>
<hr>
<form>
<select id="sel" onchange="changeImage()">
	<option value="images/apple.jpeg">사과
	<option value="images/mango.jpeg">망고
</select>
<span id="mySpan">이미지 크기</span>
</form>
<p><img id="myImg" src="images/apple.jpeg" alt="."></p>
<div id="text1"></div>
</body>
</html>
