<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Problem 2</title>
</head>
<body>

<b>과일 선택</b><br><br>

<input type="checkbox" value="1000" data-discount="0.1" onchange="calcTotal()"> 사과<br>
가격: 1000원, 할인율: 10%<br><br>

<input type="checkbox" value="2000" data-discount="0.1" onchange="calcTotal()"> 바나나<br>
가격: 2000원, 할인율: 10%<br><br>

<input type="checkbox" value="3000" data-discount="0.1" onchange="calcTotal()"> 포도<br>
가격: 3000원, 할인율: 10%<br><br>

<input type="checkbox" value="4000" data-discount="0.1" onchange="calcTotal()"> 오렌지<br>
가격: 4000원, 할인율: 10%<br><br>

<input type="checkbox" value="5000" data-discount="0.1" onchange="calcTotal()"> 망고<br>
가격: 5000원, 할인율: 10%<br><br>

<hr>
구매 금액 합계: <span id="total">0</span>원

<script>
  function calcTotal() {
    var checkboxes = document.querySelectorAll('input[type=checkbox]');
    var total = 0;
    checkboxes.forEach(function(cb) {
      if (cb.checked) {
        var price = parseInt(cb.value);
        var discount = parseFloat(cb.dataset.discount);
        total += Math.round(price * (1 - discount));
      }
    });
    document.getElementById("total").textContent = total;
  }
</script>

</body>
</html>
