<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>
            객체 배열 생성 및 활용
        </title>
    </head>
    <body>
    <h3>
        객체 배열 생성 및 활용
    </h3>
    <script>
        var alpha = ["a","b","c","d","e"];
        for(var i=0; i<alpha.length; i++){
            document.write(alpha[i].repeat(i+1) + "\n");
        }
    </script>
    </body>
</html>
