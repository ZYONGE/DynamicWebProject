<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>
            객체 생성 및 활용
        </title>
    </head>
    <body>
    <h3>
        객체 생성 및 활용
    </h3>
    <script>
        var today = new Date();
        document.write("Now: " + today.toGMTString() + "<br>");

        var mystr = new String("Hello");
        var address = new String("경기도 시흥시");
        document.write("mystr: " + mystr + "<br>");
        document.write("mystr length: " + mystr.length + "<br>");
        document.write("address: " + address + "<br>");
        document.write("address length: " + address.length + "<br>");
    </script>
    </body>
</html>
